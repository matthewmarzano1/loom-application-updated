const fmtCurrency = (v, compact) => {
  if (v == null) return '—';
  if (compact) {
    if (Math.abs(v) >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
    if (Math.abs(v) >= 1e3) return '$' + (v/1e3).toFixed(1) + 'K';
    return '$' + v.toFixed(0);
  }
  return '$' + v.toLocaleString('en-US', { maximumFractionDigits: 0 });
};
const fmtNum = (v) => v == null ? '—' : v.toLocaleString('en-US');
const fmtPct = (v) => (v >= 0 ? '+' : '') + v.toFixed(1) + '%';

function buildForecast() {
  const monthly = DATA.monthly;
  const n = monthly.length;
  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;
  monthly.forEach((m, i) => {
    sumX += i; sumY += m.spend;
    sumXY += i * m.spend; sumXX += i * i;
  });
  const slope = (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
  const intercept = (sumY - slope * sumX) / n;
  const lastDate = monthly[n-1].month.split('-').map(Number);
  let yr = lastDate[0], mo = lastDate[1];
  const forecast = [];
  for (let i = 1; i <= 20; i++) {
    mo += 1;
    if (mo > 12) { mo = 1; yr += 1; }
    const idx = n - 1 + i;
    const pred = slope * idx + intercept;
    const seasonal = mo === 1 ? 1.05 : mo === 3 ? 1.04 : mo === 7 ? 0.95 : 1.0;
    const val = Math.max(0, pred * seasonal);
    forecast.push({
      month: yr + '-' + String(mo).padStart(2,'0'),
      forecast: val,
      forecast_low: val * 0.85,
      forecast_high: val * 1.18
    });
  }
  return forecast;
}

function GeoView() {
  const maxSpend = Math.max(...DATA.by_region.map(r => r.spend));
  const [hoveredRegion, setHoveredRegion] = useState(null);
  const byEfficiency = DATA.by_region.slice().sort((a,b) => b.spend_per_unit - a.spend_per_unit);
  const hovered = hoveredRegion ? DATA.by_region.find(x => x.Region === hoveredRegion) : null;

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-3 gap-6">
        <div className="col-span-2 panel p-6">
          <div className="text-[15px] font-semibold mb-1">Spend Heatmap · North America</div>
          <div className="mono text-[10px] text-[#6b7785] tracking-wider uppercase mb-4">Bubble size = total spend · color = spend/unit intensity</div>
          <div className="relative" style={{height: 380, background: '#0a0e14', border: '1px solid #1f2630', borderRadius: 4}}>
            <svg viewBox="0 0 100 75" className="w-full h-full">
              <path d="M 8 28 L 18 14 L 32 10 L 50 8 L 68 9 L 82 12 L 92 18 L 90 30 L 88 42 L 82 50 L 78 55 L 70 60 L 60 64 L 50 65 L 40 64 L 30 60 L 22 55 L 16 48 L 10 38 Z"
                    fill="#11161e" stroke="#1f2630" strokeWidth="0.3" />
              <path d="M 12 28 L 88 28" stroke="#1f2630" strokeWidth="0.2" strokeDasharray="0.5 0.5" />
              {DATA.by_region.map((r,i) => {
                const coord = REGION_COORDS[r.Region];
                if (!coord) return null;
                const radius = 2 + (r.spend / maxSpend) * 8;
                const maxPerUnit = Math.max(...DATA.by_region.map(x => x.spend_per_unit));
                const minPerUnit = Math.min(...DATA.by_region.map(x => x.spend_per_unit));
                const t = (r.spend_per_unit - minPerUnit) / (maxPerUnit - minPerUnit);
                const color = t > 0.5 ? '#f5a623' : t > 0.3 ? '#fbbf24' : '#10b981';
                const isHover = hoveredRegion === r.Region;
                return (
                  <g key={i}>
                    <circle cx={coord.x} cy={coord.y} r={radius + 2} fill={color} opacity="0.15" />
                    <circle cx={coord.x} cy={coord.y} r={radius}
                            fill={color} opacity={isHover ? 1 : 0.8}
                            stroke={isHover ? '#e6edf3' : 'none'} strokeWidth="0.3"
                            style={{cursor:'pointer', transition: 'all 0.2s'}}
                            onMouseEnter={() => setHoveredRegion(r.Region)}
                            onMouseLeave={() => setHoveredRegion(null)} />
                    <text x={coord.x} y={coord.y + radius + 3} textAnchor="middle"
                          fill="#6b7785" fontSize="2.2" fontFamily="JetBrains Mono">
                      {r.Region.replace('US-','').replace('Canada-','CA-')}
                    </text>
                  </g>
                );
              })}
            </svg>
            {hovered && (
              <div className="absolute top-3 right-3 panel p-4 mono text-[11px]" style={{background:'#0d1218', minWidth: 200}}>
                <div className="text-[#f5a623] tracking-wider uppercase text-[10px] mb-2">{hovered.Region}</div>
                <div className="flex justify-between"><span className="text-[#6b7785]">Total Spend</span><span>{fmtCurrency(hovered.spend, true)}</span></div>
                <div className="flex justify-between"><span className="text-[#6b7785]">Tasks</span><span>{fmtNum(hovered.tasks)}</span></div>
                <div className="flex justify-between"><span className="text-[#6b7785]">Units</span><span>{fmtNum(hovered.equipment)}</span></div>
                <div className="flex justify-between border-t border-[#1f2630] mt-2 pt-2"><span className="text-[#6b7785]">$ / unit</span><span className="text-[#f5a623]">${hovered.spend_per_unit.toFixed(0)}</span></div>
              </div>
            )}
          </div>
        </div>

        <div className="panel p-6">
          <div className="text-[15px] font-semibold mb-1">Spend per Unit · Ranked</div>
          <div className="mono text-[10px] text-[#6b7785] tracking-wider uppercase mb-4">Cost intensity</div>
          <div className="space-y-3">
            {byEfficiency.map((r,i) => {
              const maxPU = byEfficiency[0].spend_per_unit;
              const pct = (r.spend_per_unit / maxPU) * 100;
              return (
                <div key={i}>
                  <div className="flex justify-between mono text-[11px] mb-1">
                    <span>{r.Region}</span>
                    <span className={i === 0 ? 'text-[#ef4444]' : i < 3 ? 'text-[#f5a623]' : 'text-[#10b981]'}>
                      ${r.spend_per_unit.toFixed(0)}
                    </span>
                  </div>
                  <div className="h-1.5 bg-[#1f2630] rounded-sm overflow-hidden">
                    <div className="h-full" style={{
                      width: pct+'%',
                      background: i === 0 ? '#ef4444' : i < 3 ? '#f5a623' : '#10b981'
                    }}></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-6">
        <div className="panel p-6">
          <div className="text-[15px] font-semibold mb-1">Spend by Region · Absolute</div>
          <ResponsiveContainer width="100%" height={240}>

          </ResponsiveContainer>

    {label: 'Stuck Open (>90 days)', count: DATA.anomaly_counts.stuck_open, severity: 'high', desc: 'Submitted long ago but never accepted or completed. May be lost work.'},
    {label: 'Likely Duplicate Records', count: DATA.anomaly_counts.duplicates, severity: 'high', desc: 'Same serial, date, and cost on multiple records. Possible double-billing.'},
    {label: 'Runaway Labor (>30hr)', count: DATA.anomaly_counts.runaway_labor, severity: 'high', desc: 'Single task with 30+ labor hours. Review with vendor — may need investigation.'},
    {label: 'Suspicious Parts Cost (>$3K)', count: DATA.anomaly_counts.huge_parts, severity: 'medium', desc: 'Parts cost dramatically above category average. Verify SKU pricing.'},
    {label: 'Date Logic Errors', count: DATA.anomaly_counts.date_errors, severity: 'low', desc: 'Completion date before submission date. Data entry error.'},
    {label: 'Negative Cost Values', count: DATA.anomaly_counts.negative_cost, severity: 'low', desc: 'Parts cost recorded as negative — likely refunds or warranty credits coded wrong.'}
  ];
  const totalCount = anomalies.reduce((s,a) => s + a.count, 0);
  const estimatedExposure = (DATA.anomaly_counts.duplicates * 700) + (DATA.anomaly_counts.runaway_labor * 4000) + (DATA.anomaly_counts.huge_parts * 5000) + (DATA.anomaly_counts.stuck_open * 700);

  return (
    <div className="space-y-6">
      <div className="grid grid-cols-3 gap-4">
        <KPI label="Total Flagged Records" value={fmtNum(totalCount)} accent="#f5a623" />
        <KPI label="Estimated $ Exposure" value={fmtCurrency(estimatedExposure, true)} accent="#ef4444" />
        <KPI label="% of Total Records" value={(totalCount/10012*100).toFixed(1)+'%'} />
      </div>

      <div className="grid grid-cols-2 gap-6">
        {anomalies.map((a,i) => {
          const sevColor = a.severity === 'high' ? '#ef4444' : a.severity === 'medium' ? '#f5a623' : '#6b7785';
          return (
            <div key={i} className="panel p-5">
              <div className="flex items-start justify-between mb-3">
                <div>
                  <div className="mono text-[10px] tracking-wider uppercase mb-1" style={{color: sevColor}}>
                    ▲ {a.severity}
                  </div>
                  <div className="font-semibold text-[14px]">{a.label}</div>
                </div>
                <div className="mono text-[26px] font-bold" style={{color: sevColor}}>{a.count}</div>
              </div>
              <div className="text-[12px] text-[#9ca3af] leading-relaxed">{a.desc}</div>
            </div>
          );
        })}
      </div>

      <div className="panel p-6">
        <div className="text-[15px] font-semibold mb-1">Recommended Next Steps</div>
        <div className="mono text-[10px] text-[#6b7785] tracking-wider uppercase mb-4">Prioritized by financial impact</div>
        <div className="space-y-3">
          {[
            {n: 1, title: 'Investigate 24 duplicate records', body: 'Cross-check vendor invoices against task IDs. Potential recovery: $15-25K.', color: '#ef4444'},
            {n: 2, title: 'Audit 18 runaway-labor tickets', body: 'Each is 30-80 hrs — well above category average. Could be legitimate (major rebuilds) or billing errors.', color: '#ef4444'},
            {n: 3, title: 'Verify 15 high-parts-cost claims', body: 'Parts >$3K. Compare to OEM list pricing. Renegotiate with supplier if confirmed inflated.', color: '#f5a623'},
            {n: 4, title: 'Close out 40 stuck-open tickets', body: 'Work was likely done but never logged. Reconcile with field service.', color: '#f5a623'},
            {n: 5, title: 'Patch data entry workflow', body: '80 records missing dates and 12 with date logic errors point to UI/process issues at intake.', color: '#6b7785'}
          ].map((s,i) => (
            <div key={i} className="flex items-start gap-4 p-3 border border-[#1f2630]">
              <div className="mono text-[20px] font-bold" style={{color: s.color}}>{'0' + s.n}</div>
              <div className="flex-1">
                <div className="font-semibold text-[13px] mb-1">{s.title}</div>
                <div className="text-[11px] text-[#9ca3af]">{s.body}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('overview');
  const views = {
    overview: <OverviewView />,
    spend: <SpendView />,
    forecast: <ForecastView />,
    geo: <GeoView />,
    fleet: <FleetView />,
    anomalies: <AnomaliesView />
  };
  return (
    <div className="min-h-screen bg-[#0a0e14] bg-grid">
      <Header activeView={view} setView={setView} />
      <div className="max-w-[1600px] mx-auto px-6 py-6">
        {views[view]}
        <div className="mt-10 mb-4 text-center mono text-[9px] text-[#6b7785] tracking-wider uppercase">
          Fleet R&amp;M Command · Prototype · Dummy Data
        </div>
      </div>
    </div>
  );
}

// Hide loader & render
document.getElementById('loading').style.display = 'none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
